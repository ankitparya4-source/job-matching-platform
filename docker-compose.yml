services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobmatch-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: jobmatch
      POSTGRES_PASSWORD: jobmatch_dev_2024
      POSTGRES_DB: jobmatch_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmatch -d jobmatch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
